name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Quality gate
        run: python .\quality_gate.py
        if: runner.os == 'Windows'
      - name: Quality gate
        run: python ./quality_gate.py
        if: runner.os != 'Windows'
      - name: Reproduce
        if: runner.os == 'Windows' && matrix.python-version == '3.13'
        shell: pwsh
        run: .\reproduce.ps1 -OutDir "$env:RUNNER_TEMP\crypto_pqc_radar" -Force
