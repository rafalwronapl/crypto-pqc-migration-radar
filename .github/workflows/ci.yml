name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Quality gate
        run: python .\quality_gate.py
      - name: Reproduce
        shell: pwsh
        run: .\reproduce.ps1 -OutDir "$env:RUNNER_TEMP\crypto_pqc_radar" -Force
